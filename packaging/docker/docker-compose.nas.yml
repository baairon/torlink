# TorZlink NAS deploy — Traefik v3 + switch direct|vpn
#
# Usage (via tools/deploy-nas.sh or manually):
#   TORZLINK_NETWORK_MODE=direct  → docker compose --profile direct up -d
#   TORZLINK_NETWORK_MODE=vpn     → docker compose --profile vpn up -d
#
# vpn mode shares Gluetun's network namespace (like qBittorrent). Add Traefik
# labels from traefik-gluetun-torzlink.labels.md onto the gluetun service.

name: torzlink

x-torzlink-common: &torzlink-common
  # Full image ref. Examples:
  #   TORZLINK_IMAGE=torzlink:v1.7.1                    (deploy-from-dev)
  #   TORZLINK_IMAGE=ghcr.io/tiizss/torzlink:v1.7.1     (GHCR)
  # Legacy .env with only TORZLINK_IMAGE_TAG: run deploy-nas.sh (migrates) or set TORZLINK_IMAGE.
  image: ${TORZLINK_IMAGE:-ghcr.io/tiizss/torzlink:latest}
  container_name: torzlink
  restart: unless-stopped
  # Match NAS media ownership (Ugreen media dirs are typically UID 1000).
  # Image default USER torzlink (uid 100) cannot write those mounts (EACCES).
  user: "${PUID:-1000}:${PGID:-1000}"
  # Docker socket group (docker.sock) — required for in-UI VPN↔direct switch
  group_add:
    - "${DOCKER_GID:-999}"
  command: ["serve", "--host", "0.0.0.0", "--port", "8787"]
  environment:
    TZ: ${TZ:-Europe/Madrid}
    TORZLINK_STATE_DIR: /data
    TORZLINK_DOWNLOAD_DIR: /downloads
    TORZLINK_DISABLE_NAT: "1"
    TORZLINK_SKIP_UPDATE: "1"
    TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-}
    TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
    TORZLINK_SERVE_TOKEN: ${TORZLINK_SERVE_TOKEN:-}
    TORZLINK_NETWORK_MODE: ${TORZLINK_NETWORK_MODE:-direct}
    # Deploy .env (compose project dir) so UI can persist Red↔VPN preference
    TORZLINK_DEPLOY_ENV_FILE: /run/torzlink-deploy.env
    # Apply VPN ON/OFF from the web UI without a manual redeploy
    TORZLINK_DEPLOY_DIR: /deploy
    TORZLINK_COMPOSE_FILE: /deploy/docker-compose.nas.yml
    COMPOSE_PROJECT_NAME: torzlink
    # Explicit sh — Alpine image has no bash; script is POSIX.
    TORZLINK_NETWORK_SWITCH_CMD: sh /opt/torzlink/torzlink-network-switch.sh
  volumes:
    - ${DOCKER_CONFIG_ROOT}/torzlink:/data
    # Host path for completed/active downloads (same tree as qBittorrent media)
    - ${TORZLINK_DOWNLOADS_HOST:-/volume1/data/media/descargas/torrents}:/downloads
    - ./.env:/run/torzlink-deploy.env
    # Deploy dir (compose + .env) + switch helper + Docker socket for profile recreate
    - .:/deploy
    - ./torzlink-network-switch.sh:/opt/torzlink/torzlink-network-switch.sh:ro
    - /var/run/docker.sock:/var/run/docker.sock

services:
  torzlink:
    <<: *torzlink-common
    profiles: ["direct"]
    networks:
      - proxy_net
    labels:
      - traefik.enable=true
      - traefik.http.routers.torzlink.entrypoints=web
      - traefik.http.routers.torzlink.rule=Host(`torzlink.lan`)
      - traefik.http.routers.torzlink.service=torzlink-service
      - traefik.http.services.torzlink-service.loadbalancer.server.port=8787

  torzlink-vpn:
    <<: *torzlink-common
    profiles: ["vpn"]
    network_mode: container:${GLUETUN_CONTAINER_NAME:-gluetun}
    # Traefik cannot attach labels here — paste the vpn snippet onto gluetun.

networks:
  proxy_net:
    external: true
    # Required for profile `direct`. For `vpn` set any existing name or your real proxy_net.
    name: ${PROXY_NET_NAME:-proxy_net}

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TorZlink</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="brand">
        <div class="brand-top">
          <div class="brand-copy">
            <div class="brand-bar">
              <span class="dot">▌</span>
              <span>terminal · serve</span>
              <span>·</span>
              <span id="brand-mode-label">lan</span>
            </div>
            <div class="brand-title-row">
              <h1>
                <span class="brand-letter"><span class="brand-emoji brand-emoji--right" aria-hidden="true">🐄</span>T</span>or<span class="brand-letter"><span class="brand-emoji" aria-hidden="true">🦄</span>Z</span>link
              </h1>
              <div class="cow-herd" aria-hidden="true">
                <span class="cow-herd-cow" style="--i: 0">🐄</span>
                <span class="cow-herd-cow" style="--i: 1">🐄</span>
                <span class="cow-herd-cow" style="--i: 2">🐄</span>
                <span class="cow-herd-cow" style="--i: 3">🐄</span>
                <span class="cow-herd-cow" style="--i: 4">🐄</span>
                <span class="cow-herd-cow" style="--i: 5">🐄</span>
              </div>
            </div>
          </div>
          <div class="net-switch" title="VPN vía Gluetun — OFF = red del NAS">
            <span class="net-switch-title">VPN</span>
            <button
              type="button"
              id="net-switch"
              role="switch"
              aria-checked="false"
              aria-label="VPN"
            >
              <span class="net-switch-track" aria-hidden="true">
                <span class="net-switch-thumb"></span>
              </span>
            </button>
            <span class="net-switch-state" id="net-switch-state">OFF</span>
          </div>
        </div>
        <p class="tagline"><span class="prompt">❯</span> busca y descarga torrents</p>
        <p id="net-status" class="net-status" hidden></p>
      </header>

      <section id="auth-gate" class="panel" hidden>
        <div class="panel-head">
          <span class="chrome">❯</span>
          <h2>auth</h2>
        </div>
        <div class="panel-body">
          <p class="status">Este servidor exige <code>TORZLINK_SERVE_TOKEN</code>.</p>
          <form id="auth-form" class="row">
            <label class="prompt-field">
              <span class="caret">$</span>
              <input id="token" name="token" type="password" placeholder="Bearer token" required autocomplete="current-password" />
            </label>
            <button type="submit">Entrar</button>
          </form>
        </div>
      </section>

      <main id="main" class="layout">
        <section class="panel" aria-labelledby="search-heading">
          <div class="panel-head">
            <span class="chrome">❯</span>
            <h2 id="search-heading">search</h2>
          </div>
          <div class="panel-body">
            <form id="search-form" class="row">
              <label class="prompt-field">
                <span class="caret">❯</span>
                <input
                  id="q"
                  name="q"
                  type="search"
                  placeholder="película, serie, juego…"
                  autocomplete="off"
                  maxlength="200"
                  required
                />
              </label>
              <button type="submit" id="search-btn">Buscar</button>
            </form>
            <fieldset class="search-toolbar">
              <legend class="visually-hidden">Filtros de búsqueda</legend>
              <div id="category-tabs" class="cat-tabs" role="tablist" aria-label="Categoría"></div>
              <div class="search-tools">
                <label class="tool-check">
                  <input type="checkbox" id="hide-dead" />
                  <span>solo vivos</span>
                </label>
                <label class="tool-select">
                  <span>orden</span>
                  <select id="sort-field" aria-label="Ordenar resultados">
                    <option value="">seeders ▾</option>
                    <option value="seeders:asc">seeders ▴</option>
                    <option value="size:desc">size ▾</option>
                    <option value="size:asc">size ▴</option>
                    <option value="name:asc">name ▴</option>
                    <option value="name:desc">name ▾</option>
                    <option value="source:asc">source ▴</option>
                  </select>
                </label>
              </div>
            </fieldset>
            <p id="search-status" class="status" hidden></p>
            <ul id="results" class="list"></ul>
          </div>
        </section>

        <section class="panel" aria-labelledby="library-heading">
          <div class="panel-head panel-head--tabs">
            <span class="chrome">↓</span>
            <h2 id="library-heading" class="visually-hidden">library</h2>
            <div class="panel-tabs" role="tablist" aria-label="Cola e historial">
              <button type="button" class="panel-tab is-active" role="tab" aria-selected="true" data-lib-tab="queue">queue</button>
              <button type="button" class="panel-tab" role="tab" aria-selected="false" data-lib-tab="history">history</button>
              <button type="button" class="panel-tab" role="tab" aria-selected="false" data-lib-tab="seeding">seeding</button>
            </div>
          </div>
          <div class="panel-body">
            <div id="lib-queue" class="lib-pane" data-lib-pane="queue">
              <form id="magnet-form" class="row">
                <label class="prompt-field">
                  <span class="caret">+</span>
                  <input
                    id="magnet"
                    name="magnet"
                    type="text"
                    placeholder="magnet:?xt=urn:btih:… o infohash"
                    autocomplete="off"
                  />
                </label>
                <button type="submit">Añadir</button>
              </form>
              <ul id="queue" class="list"></ul>
            </div>
            <div id="lib-history" class="lib-pane" data-lib-pane="history" hidden>
              <div class="row lib-actions">
                <button type="button" id="history-clear" class="danger">Vaciar historial</button>
              </div>
              <ul id="history" class="list"></ul>
            </div>
            <div id="lib-seeding" class="lib-pane" data-lib-pane="seeding" hidden>
              <ul id="seeds" class="list"></ul>
            </div>
          </div>
        </section>

        <section class="panel config-panel" aria-labelledby="config-heading">
          <div class="panel-head">
            <span class="chrome">⚙</span>
            <h2 id="config-heading">config</h2>
          </div>
          <div class="panel-body">
            <form id="config-form" class="config-form">
              <label class="config-field">
                <span>download dir</span>
                <input
                  id="config-download-dir"
                  name="downloadDir"
                  type="text"
                  autocomplete="off"
                  spellcheck="false"
                />
              </label>
              <label class="config-field">
                <span>trackers</span>
                <textarea
                  id="config-trackers"
                  name="trackers"
                  rows="2"
                  spellcheck="false"
                  placeholder="udp://… https://… (espacio o coma)"
                ></textarea>
              </label>
              <div class="row config-actions">
                <button type="submit">Guardar</button>
                <p id="config-status" class="status" hidden></p>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>

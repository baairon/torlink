name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
        env:
          TORZLINK_SKIP_UPDATE: "1"
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - id: image
        shell: bash
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.name }}:latest
            ghcr.io/${{ steps.image.outputs.name }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    runs-on: ubuntu-latest
    needs: [test, docker]
    steps:
      - uses: actions/checkout@v4
      - name: Extract changelog for tag
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            awk -v tag="$TAG" '
              /^## \[/ {
                if (found) exit
                line = $0
                gsub(/^## \[/, "", line)
                gsub(/\].*$/, "", line)
                if (line == tag || line == tag "-fork") found = 1
                next
              }
              found { print }
            ' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > release-notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
